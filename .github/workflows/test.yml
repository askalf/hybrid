# Every deterministic surface tests offline — no model, no network, no dependencies —
# so CI runs the full suite on every push and PR in seconds.
name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: compile everything
        run: python -m py_compile hybrid.py solver.py verify.py equations.py templates.py server.py bench_offline.py bench_router.py measure_routing.py
      - name: solver oracle (53)
        run: python test_solver.py
      - name: plug-back verifier (28)
        run: python test_verify.py
      - name: setup re-derivation (45)
        run: python test_equations.py
      - name: router plumbing + failure policy (16)
        run: python test_route.py
      - name: server surface (18)
        run: python test_server.py
      - name: template transcriber (58)
        run: python test_templates.py
      - name: anthropic messages surface (32)
        run: python test_messages.py
      - name: llamacpp backend + grammars (64)
        run: python test_backend.py
      - name: startup warmup primer
        run: python test_warmup.py
      - name: token accounting
        run: python test_tokens.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: build sdist + wheel
        run: |
          python -m pip install --require-hashes -r .github/build-requirements.txt
          python -m build
      - name: install the wheel
        run: python -m pip install dist/*.whl
      - name: console-script smoke, away from the checkout (SOLVED tier needs no model)
        working-directory: /tmp
        run: |
          hybrid --version
          hybrid "What is 47 times 19?" | grep -q 893
          (hybrid-server &)
          sleep 1
          python -c "import urllib.request; assert b'\"status\": \"ok\"' in urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"
