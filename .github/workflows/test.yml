# Every deterministic surface tests offline — no model, no network, no dependencies —
# so CI runs the full suite on every push and PR in seconds.
name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: compile everything
        run: python -m py_compile hybrid.py solver.py verify.py equations.py server.py bench_offline.py bench_router.py measure_routing.py
      - name: solver oracle (53)
        run: python test_solver.py
      - name: plug-back verifier (28)
        run: python test_verify.py
      - name: setup re-derivation (45)
        run: python test_equations.py
      - name: router plumbing + failure policy (16)
        run: python test_route.py
      - name: server surface (18)
        run: python test_server.py
